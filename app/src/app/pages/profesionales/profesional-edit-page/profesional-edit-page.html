<h1>Editar Profesional</h1>

@if (loading()) {
    <div class="loading-container">
        <mat-spinner diameter="48"></mat-spinner>
        <p>Cargando profesional...</p>
    </div>
}

@if (error()) {
    <div class="error-container">
        <mat-icon>error_outline</mat-icon>
        <p>{{ error() }}</p>
        <button mat-flat-button class="primary-button" (click)="cargarDatosFormulario()">Reintentar</button>
    </div>
}

@if (!loading() && !error()) {
    <app-profesional-form
        [profesional]="profesional()"
        [usuarios]="usuarios()"
        [saving]="saving()"
        (guardar)="guardar($event)"
        (cancelar)="cancelar()"
    />
}
